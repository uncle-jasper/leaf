  :root {
    --bg: #f5f0e8;
    --surface: #ede8de;
    --text: #2c2416;
    --accent: #8b6e4e;
    --muted: #a89880;
    --border: #d4c8b4;
    --font-size: 18px;
    --editor-font: 'iAWriterMonoS', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    font-size: var(--font-size);
    height: 100vh;
    height: 100svh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* ── Toolbar ── */
  #header {
    flex-shrink: 0;
    transition: opacity 0.35s, transform 0.35s;
  }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s;
  }

  /* autohide — only toolbar slides away, tab bar stays */
  body.toolbar-hidden #toolbar {
    opacity: 0;
    transform: translateY(-100%);
    pointer-events: none;
    position: absolute;
    width: 100%;
    z-index: 11;
    top: 0;
    transition: opacity 0.35s, transform 0.35s;
  }
  body.toolbar-peek #toolbar {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  body.focus-mode #header {
    opacity: 0;
    transform: translateY(-100%);
    pointer-events: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1001;
    transition: opacity 0.3s, transform 0.3s;
  }
  body.focus-mode.toolbar-peek #header {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  body.focus-mode #tab-bar { display: none; }
  body.focus-mode #statusbar {
    opacity: 0;
    transition: opacity 0.4s;
  }
  body.focus-mode:hover #statusbar,
  body.focus-mode #statusbar:hover { opacity: 1; }
  body.focus-mode #editor-scroll {
    padding: 0 5% 34px;
  }
  body.focus-mode #editor {
    padding-top: 5vh;
  }

  #focus-hint {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 20px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    z-index: 100;
  }
  #focus-hint.show { opacity: 1; }

  .tool-group {
    display: flex;
    align-items: center;
    gap: 2px;
    padding-right: 8px;
    border-right: 1px solid var(--border);
    margin-right: 4px;
  }
  .tool-group:last-child { border-right: none; }

  button {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--text);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 5px 9px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  button:hover { background: var(--border); border-color: var(--muted); }
  button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .icon-btn { font-size: 15px; padding: 5px 8px; }

  #filename-input {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 5px 8px;
    width: 160px;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
  }
  #filename-input:focus { border-color: var(--muted); background: var(--bg); }

  select {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--text);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 5px 6px;
    outline: none;
    transition: background 0.15s, border-color 0.15s;
  }
  select:hover { background: var(--border); border-color: var(--muted); }

  .color-pair {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  input[type="color"] {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    padding: 1px;
    background: transparent;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }
  .hex-input {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 5px;
    width: 68px;
    outline: none;
    transition: border-color 0.2s;
  }
  .hex-input:focus { border-color: var(--muted); }

  /* ── Editor area ── */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Scrollable wrapper that centers the textarea */
  #editor-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    position: relative;
    padding: 0 5% 34px;
    background: var(--bg);
    transition: background 0.3s;
  }

  #editor::selection {
    background: var(--accent);
    color: var(--text);
  }
  #editor::placeholder {
    color: var(--muted);
    opacity: 0.45;
  }


  #editor {
    font-family: var(--editor-font);
    font-size: var(--font-size);
    line-height: 1.8;
    outline: none;
    resize: none;
    border: none;
    background: transparent;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    caret-color: var(--accent);
    transition: color 0.3s;
    /* Fixed 68ch content width — padding does not eat into this */
    width: 68ch;
    max-width: 100%;
    min-width: 0;
    flex-shrink: 0;
    padding-top: 24px;
    min-height: 100%;
  }

  #preview {
    flex: 1;
    overflow-y: auto;
    padding: 24px 5% 0;
    line-height: 1.8;
    outline: none;
    position: relative;
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s, color 0.3s;
  }

  #preview {
    display: none;
    border-left: 1px solid var(--border);
    font-family: 'Lora', Georgia, serif;
  }
  #preview.visible { display: block; }
  #editor-scroll.half { border-right: none; }

  #split-divider {
    display: none;
    width: 1px;
    background: var(--border);
    flex-shrink: 0;
    position: relative;
    align-items: center;
    justify-content: center;
  }
  body.split-mode #split-divider { display: flex; }

  #btn-sync-scroll {
    position: absolute;
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    padding: 2px 4px;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.15s;
    line-height: 1;
  }
  #btn-sync-scroll:hover { opacity: 0.85; background: var(--surface); }
  #btn-sync-scroll.synced { opacity: 0.7; color: var(--accent); }

  /* ── Preview typography ── */
  #preview h1 { font-size: 2em; font-weight: 600; margin: 0.5em 0 0.3em; line-height: 1.3; }
  #preview h2 { font-size: 1.5em; font-weight: 600; margin: 1em 0 0.3em; }
  #preview h3 { font-size: 1.2em; font-weight: 600; margin: 0.8em 0 0.3em; }
  #preview p { margin: 0.7em 0; }
  #preview ul, #preview ol { margin: 0.5em 0; padding-left: 1.5em; }
  #preview li { margin: 0.2em 0; padding-left: 0.3em; }
  #preview blockquote {
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 16px;
    color: var(--muted);
    font-style: italic;
    margin: 0.8em 0;
  }
  #preview code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: var(--surface);
    padding: 1px 5px;
    border-radius: 3px;
  }
  #preview pre {
    background: var(--surface);
    padding: 14px 18px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 0.8em 0;
  }
  #preview pre code { background: none; padding: 0; }
  #preview hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
  #preview a { color: var(--accent); }
  #preview strong { font-weight: 600; }
  #preview em { font-style: italic; }
  #preview table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
  #preview th, #preview td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  #preview th { background: var(--surface); font-weight: 600; }

  /* ── Tab bar ── */
  #tab-bar {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: none;
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
    gap: 0;
    padding: 2px 8px;
    border-bottom: 1px solid;
    border-color: rgba(128,128,128,0.15);
    transition: background 0.3s, opacity 0.6s;
  }
  body.tabbar-faded #tab-bar {
    opacity: 0;
    pointer-events: none;
  }
  #tab-bar::-webkit-scrollbar { display: none; }
  #tab-list { display: flex; align-items: center; flex: 1; gap: 16px; }
  .tab {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 2px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    opacity: 0.4;
    cursor: pointer;
    white-space: nowrap;
    max-width: 160px;
    transition: opacity 0.15s, color 0.15s;
    user-select: none;
    border: none;
    background: none;
  }
  .tab:hover { opacity: 0.7; }
  .tab.active { opacity: 0.5; color: var(--text); }
  .tab.dirty .tab-name::after { content: ' ·'; font-size: 10px; }
  .tab-name { overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .tab-close {
    font-size: 11px;
    color: var(--muted);
    opacity: 0;
    line-height: 1;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .tab:hover .tab-close,
  .tab.active .tab-close { opacity: 0.5; }
  .tab-close:hover { opacity: 1 !important; }
  #btn-new-tab {
    font-size: 14px;
    padding: 1px 6px;
    color: var(--muted);
    opacity: 0.5;
    flex-shrink: 0;
    border: none;
    background: none;
    transition: opacity 0.15s;
  }
  #btn-new-tab:hover { opacity: 0.9; background: none; }
  #btn-pin-tabs {
    font-size: 12px;
    padding: 1px 6px;
    color: var(--muted);
    opacity: 0;
    pointer-events: none;
    flex-shrink: 0;
    border: none;
    background: none;
    transition: opacity 0.3s;
  }
  body.show-pin #btn-pin-tabs { opacity: 0.5; pointer-events: auto; }
  body.show-pin #btn-pin-tabs.pinned { opacity: 0.6; color: var(--accent); pointer-events: auto; }
  #btn-pin-tabs:hover { opacity: 0.6; background: none; }

  /* ── Status bar ── */
  #welcome-msg {

  body[data-theme="moss"]  { --bg:#1e2420; --surface:#242d28; --text:#d4ddd0; --accent:#82b890; --muted:#607860; --border:#2e3d30; }

  body[data-theme="paper"] { --bg:#f5f7fa; --surface:#eceef2; --text:#1a1d23; --accent:#4a6080; --muted:#8a96a8; --border:#d4d8e0; }
  body[data-theme="terminal"] { --bg:#0a0a0a; --surface:#0f0f0f; --text:#22cc22; --accent:#0a5c0a; --muted:#1a7a1a; --border:#1a3a1a; }
  body[data-theme="terminal"] #editor,
  body[data-theme="terminal"] #preview {
    text-shadow: 0 0 8px rgba(51,255,51,0.35);
  }
  body[data-theme="terminal"].crt-on #editor,
  body[data-theme="terminal"].crt-on #preview {
    text-shadow: 0 0 10px rgba(51,255,51,0.55), 0 0 3px rgba(51,255,51,0.7);
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: unset;
  }
  body[data-theme="terminal"] #statusbar { text-shadow: 0 0 6px rgba(51,255,51,0.4); }
  body[data-theme="terminal"] button,
  body[data-theme="terminal"] select,

  @keyframes crt-blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* CRT scanlines + flicker — terminal theme only */
  @keyframes crt-flicker {
    0%   { opacity: 1; }
    92%  { opacity: 1; }
    93%  { opacity: 0.93; }
    94%  { opacity: 1; }
    96%  { opacity: 0.96; }
    97%  { opacity: 1; }
    99%  { opacity: 0.97; }
    100% { opacity: 1; }
  }

  body[data-theme="terminal"].crt-on {
    animation: crt-flicker 8s infinite;
  }

  body[data-theme="terminal"].crt-on::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 1px,
      rgba(0,0,0,0.25) 1px,
      rgba(0,0,0,0.25) 3px
    );
    pointer-events: none;
    z-index: 9999;
  }

  body[data-theme="terminal"].crt-on::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center,
      transparent 60%,
      rgba(0,0,0,0.55) 100%
    );
    pointer-events: none;
    z-index: 9998;
  }

  /* Underline cursor for terminal theme */
  body[data-theme="terminal"] #editor {
    caret-color: #33ff33;
    caret-shape: underscore;
  }

  @media (max-width: 600px) {
    #editor-scroll { padding: 0 6%; } #preview { padding: 28px 6% 0; } #editor { padding-top: 28px; }
    .color-pair span { display: none; }
  }

  /* ── Cage easter egg ── */
  #cage-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }
  .cage-img {
    position: absolute;
    width: 160px;
    height: 160px;
    object-fit: cover;
    border-radius: 8px;
    will-change: transform, opacity;
    animation: cage-fly var(--cage-dur, 4s) ease-in-out forwards;
  }
  @keyframes cage-fly {
    0%   { transform: translate(-50%, -50%) scale(0.1) rotate(0deg) perspective(400px) rotateX(60deg); opacity: 0; }
    15%  { opacity: 1; }
    50%  { transform: translate(-50%, -50%) scale(1.2) rotate(var(--cage-spin)) perspective(400px) rotateX(var(--cage-tilt)); opacity: 1; }
    70%  { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(2.5) rotate(calc(var(--cage-spin) * 2)) perspective(400px) rotateX(0deg); opacity: 0; }
  }

  #cage-final {
    position: fixed;
    inset: 0;
    background-image: var(--cage-bg);
    background-size: cover;
    background-position: center;
    z-index: 10000;
    pointer-events: none;
    opacity: 0;
    animation: cage-final-anim 2.5s ease-in-out forwards;
  }
  @keyframes cage-final-anim {
    0%   { opacity: 0; transform: scale(0.05); }
    15%  { opacity: 1; transform: scale(0.15); }
    70%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.05); }
  }

  /* ── About modal ── */
  #about-overlay {

  }

  }

  }
  #btn-crt-toggle {
    display: none;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 6px;
    background: none;
    border: none;

    letter-spacing: 0.05em;
  }

  #btn-crt-toggle.crt-off {
    opacity: 0.3;
    text-decoration: line-through;
  }
  body[data-theme="terminal"] #btn-crt-toggle { display: inline-block; }

  /* ── Just Write mode ── */
  #theme-select:disabled,
  #font-select:disabled,
  #color-bg:disabled,
  #color-text:disabled,
  #color-accent:disabled,

    cursor: not-allowed;
  }

  body[data-theme="terminal"].amber-crt { --text:#ffb000; --accent:#7a4a00; --muted:#a06a00; --border:#3a2200; }

Vibe coded by Dan (c) 2026
Version 1.5.2

================================================================================
WHAT IS LEAF?
================================================================================

Leaf is a lightweight, distraction-free writing tool that runs entirely in your
web browser as a single HTML file. There's nothing to install, no account to
create, and no internet connection required. Just open the file and write.

The fonts (iA Writer Mono, Duo, and Quattro) are embedded directly in the HTML
file, so they work offline and look identical on every machine.


================================================================================
FILES IN THIS PACKAGE
================================================================================

  editor.html               The editor itself
  leaf.webmanifest          PWA manifest (for browser installation)
  sw.js                     Service worker (for offline PWA support)
  leaf-icon-192.png         App icon (192px)
  leaf-icon-512.png         App icon (512px)

Keep all files in the same folder.


================================================================================
GETTING STARTED
================================================================================

OPTION 1 - Open directly in a browser
Double-click editor.html. Works in any modern browser.

OPTION 2 - Install as a PWA (Chrome / Edge)
Open https://uncle-jasper.github.io/leaf/editor.html in Chrome or Edge.
An install button will appear in the address bar or browser menu.
Click it to install Leaf as a standalone app with its own window and icon.
Once installed, Leaf works fully offline.


================================================================================
THE INTERFACE
================================================================================

TOOLBAR (top strip)
  Filename field        Set the name of your file before saving
  save                  Downloads your file (or saves in place in Chrome)
  open                  Load an existing .txt or .md file
  write / split / prev  Switch between write, split, and preview modes
  Theme menu            Choose your color theme
  Font menu             Choose your writing font
  Size menu             Choose your font size
  autohide              Hides toolbar while typing; hover top of screen to show
  focus                 Fullscreen focus mode (Esc or Ctrl+Shift+F to exit)
  ...                   About Leaf

TAB BAR (below toolbar)
  Shows open files below the toolbar. Click to switch, + to open new,
  x to close. In focus mode, the tab bar is hidden.

  In autohide mode, the toolbar hides when you click into the editor.
  Move your mouse to the top of the screen to reveal it. The tab bar
  stays visible and can be pinned (⊙) so it never fades, or unpinned
  (⦿) to let it fade after a few seconds. Pin state is remembered
  between sessions.

STATUS BAR
  Shows live word count, character count, line count, and cursor position.
  When text is selected, shows the word and character count of the selection.
  Fades out in focus mode and reappears on hover.
  Displays a random welcome message on launch.
  Shows milestone messages at 100, 250, 500, 1000, 2000, and 5000 words.
  Shows a quiet idle nudge after 3 minutes of inactivity.
  All status messages can be disabled via the toggle in the About modal.


================================================================================
THEMES
================================================================================

  parchment   Warm cream (default)
  paper       Cool white with a slight blue-grey tint
  dark        Near-black with cool grey text
  moss        Dark green
  slate       Dark blue-grey
  terminal    Black with dimmed green phosphor text. Includes an optional
              CRT mode ([CRT] in toolbar) — a fun retro nod to the monochrome
              green monitors of the 80s. Rumor has it there's another color
              hiding in there somewhere.
  custom      Pick your own colors using the color picker or hex code input

Settings (theme, font, size, autohide, pin state) are remembered between
sessions.


================================================================================
FONTS
================================================================================

The iA Writer fonts are embedded in the HTML file and work offline.
All other fonts require an internet connection.

  iA Writer Mono      Classic monospaced typewriter feel (default)
  iA Writer Duo       Proportional with a monospace structure
  iA Writer Quattro   Most proportional of the three, very readable
  JetBrains Mono      Clean developer monospace
  Fira Code           Elegant monospace with ligatures
  Inconsolata         Clean, neutral console font
  Share Tech Mono     Softer retro monospace


================================================================================
KEYBOARD SHORTCUTS
================================================================================

  Ctrl+S          Save file
  Ctrl+B          Bold selected text (**text**)
  Ctrl+I          Italic selected text (*text*)
  Ctrl+K          Wrap selection in link [text](url)
  Ctrl+1          Heading 1 (toggle)
  Ctrl+2          Heading 2 (toggle)
  Ctrl+3          Heading 3 (toggle)
  Ctrl+4          Heading 4 (toggle)
  Ctrl+Shift+J    Toggle Just Write mode
  Ctrl+Shift+F    Toggle focus mode
  Ctrl+Shift+P    Toggle preview mode
  Ctrl+Shift+S    Toggle split view
  Ctrl+N          New tab
  Ctrl+W          Close current tab
  Ctrl+[          Previous tab
  Ctrl+]          Next tab
  Esc             Exit focus mode / close About dialog
  Tab             Insert two spaces


================================================================================
SAVING
================================================================================

In Chrome, the first save opens a Save As dialog. Every subsequent save
writes silently to the same file with no dialog. The status bar flashes
a saved confirmation.

In Brave and other browsers, each save downloads the file. Name the file
using the filename field before saving.

Leaf also autosaves your work to browser storage every 30 seconds. If Leaf
is closed unexpectedly and you reopen it, you will be offered the chance to
restore your last autosaved draft.


================================================================================
JUST WRITE MODE
================================================================================

Leaf is, at its core, a writing tool. Just Write mode is a reminder of that.

Press Ctrl+Shift+J to lock your theme and font for 30 minutes, even across
sessions. The idea is simple: stop tweaking, start writing. No fiddling with
colors. No hunting for the perfect font. No excuses.

Write 500 words to earn your freedom early.

================================================================================

// ── Just Write mode ──────────────────────────────────────
const JUST_WRITE_KEY     = 'leaf-just-write-until';
const JUST_WRITE_WORDS   = 500;
const JUST_WRITE_MINUTES = 30;
let justWriteActive    = false;
let justWriteWordStart = 0;

function activateJustWrite() {
  const until = Date.now() + JUST_WRITE_MINUTES * 60 * 1000;
  localStorage.setItem(JUST_WRITE_KEY, until);
  justWriteActive    = true;
  justWriteWordStart = editor.value.trim() === '' ? 0 : editor.value.trim().split(/\s+/).length;
  document.body.classList.add('just-write');
  document.getElementById('theme-select').disabled = true;
  document.getElementById('font-select').disabled  = true;
  ['color-bg','color-text','color-accent','hex-bg','hex-text','hex-accent'].forEach(id => {
    document.getElementById(id).disabled = true;
  });
  if (document.getElementById('chk-welcome').checked) typeStatusMessage('JUST WRITE MODE. 30 MINUTES. NO ESCAPE.');
}

function deactivateJustWrite(msg) {
  localStorage.removeItem(JUST_WRITE_KEY);
  justWriteActive = false;
  document.body.classList.remove('just-write');
  document.getElementById('theme-select').disabled = false;
  document.getElementById('font-select').disabled  = false;
  ['color-bg','color-text','color-accent','hex-bg','hex-text','hex-accent'].forEach(id => {
    document.getElementById(id).disabled = false;
  });
  if (msg && document.getElementById('chk-welcome').checked) typeStatusMessage(msg);
}

function checkJustWrite() {
  const until = parseInt(localStorage.getItem(JUST_WRITE_KEY) || '0');
  if (until > Date.now()) {
    justWriteActive    = true;
    justWriteWordStart = editor.value.trim() === '' ? 0 : editor.value.trim().split(/\s+/).length;
    document.body.classList.add('just-write');
    document.getElementById('theme-select').disabled = true;
    document.getElementById('font-select').disabled  = true;
    ['color-bg','color-text','color-accent','hex-bg','hex-text','hex-accent'].forEach(id => {
      document.getElementById(id).disabled = true;
    });
  } else if (until) {
    localStorage.removeItem(JUST_WRITE_KEY);
  }
  // Check expiry every minute
  setTimeout(function tick() {
    if (!justWriteActive) return;
    const u = parseInt(localStorage.getItem(JUST_WRITE_KEY) || '0');
    if (Date.now() >= u) deactivateJustWrite(null);
    else setTimeout(tick, 10000);
  }, 60000);
}

// Check word count for early release
function checkJustWriteRelease(words) {
  if (!justWriteActive) return;
  const wordsWritten = words - justWriteWordStart;
  if (wordsWritten >= JUST_WRITE_WORDS) {
    deactivateJustWrite('500 WORDS. YOU HAVE EARNED YOUR FREEDOM.');
  }
}

// ── Markdown parser (preview pane only) ──────────────────
function parseMarkdown(md) {
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, (_,c) => `<pre><code>${c.trim()}</code></pre>`)
    .replace(/^#{6} (.+)$/gm,'<h6>$1</h6>')
    .replace(/^#{5} (.+)$/gm,'<h5>$1</h5>')
    .replace(/^#{4} (.+)$/gm,'<h4>$1</h4>')
    .replace(/^#{3} (.+)$/gm,'<h3>$1</h3>')
    .replace(/^#{2} (.+)$/gm,'<h2>$1</h2>')
    .replace(/^#{1} (.+)$/gm,'<h1>$1</h1>')
    .replace(/^[-*_]{3,}$/gm,'<hr>')
    .replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/_(.+?)_/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2" style="max-width:100%">')
    .replace(/\[([^\]]*)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/^[-*] (.+)$/gm,'<uli>$1</uli>')
    .replace(/^\d+\. (.+)$/gm,'<oli>$1</oli>')
    .replace(/(<uli>[\s\S]*?<\/uli>\n?)+/g, m => '<ul>' + m.replace(/<\/?uli>/g, t => t.includes('/') ? '</li>' : '<li>') + '</ul>')
    .replace(/(<oli>[\s\S]*?<\/oli>\n?)+/g, m => '<ol>' + m.replace(/<\/?oli>/g, t => t.includes('/') ? '</li>' : '<li>') + '</ol>')
    .replace(/\n\n+/g,'\n\n')
    .split(/\n\n/)
    .map(b => /^<(h[1-6]|ul|ol|blockquote|pre|hr)/.test(b.trim()) ? b : `<p>${b.trim()}</p>`)
    .join('\n');
  return html;
}

// ── Global scroll position ────────────────────────────────
// One shared scroll percentage, updated on scroll in any view.
// Applied when switching modes so all views stay in sync.
let globalScrollPct = 0;

function getScrollPct(editorEl, editorScrollEl) {
  if (editorEl.scrollHeight > editorEl.clientHeight)
    return editorEl.scrollTop / (editorEl.scrollHeight - editorEl.clientHeight);
  if (editorScrollEl.scrollHeight > editorScrollEl.clientHeight)
    return editorScrollEl.scrollTop / (editorScrollEl.scrollHeight - editorScrollEl.clientHeight);
  return 0;
}

function applyScrollPct(el, pct) {
  const max = el.scrollHeight - el.clientHeight;
  if (max > 0) { el.scrollTop = pct * max; return; }
  // Not ready yet — retry
  let attempts = 0;
  const retry = setInterval(() => {
    const m = el.scrollHeight - el.clientHeight;
    if (m > 0 || ++attempts > 20) {
      clearInterval(retry);
      if (m > 0) el.scrollTop = pct * m;
    }
  }, 20);
}

function setMode(mode) {
  const scroll = document.getElementById('editor-scroll');
  const editorEl = document.getElementById('editor');

  // Save current scroll position before switching
  if (currentMode === 'write') {
    globalScrollPct = getScrollPct(editorEl, scroll);
  } else if (currentMode === 'preview' || currentMode === 'split') {
    const max = preview.scrollHeight - preview.clientHeight;
    if (max > 0) globalScrollPct = preview.scrollTop / max;
  }

  currentMode = mode;
  document.getElementById('mode-select').value = mode;

  if (mode === 'write') {
    scroll.style.display=''; scroll.classList.remove('half'); preview.classList.remove('visible');
    document.body.classList.remove('split-mode');
    applyScrollPct(editorEl, globalScrollPct);
    applyScrollPct(scroll, globalScrollPct);

  } else if (mode === 'split') {
    scroll.style.display=''; scroll.classList.add('half'); preview.classList.add('visible');
    document.body.classList.add('split-mode');
    renderPreview();
    setTimeout(() => {
      applyScrollPct(editorEl, globalScrollPct);
      applyScrollPct(scroll, globalScrollPct);
      applyScrollPct(preview, globalScrollPct);
    }, 30);

  } else {
    scroll.style.display='none'; scroll.classList.remove('half'); preview.classList.add('visible');
    document.body.classList.remove('split-mode');
    renderPreview();
    setTimeout(() => applyScrollPct(preview, globalScrollPct), 30);
  }
}

});

// ── Scroll sync (split mode) ───────────────────────────────
let scrollSynced = true;
let lastScrolledPane = 'editor';

(function() {
  const editorScrollEl = document.getElementById('editor-scroll');
  const previewEl      = document.getElementById('preview');
  const editorEl       = document.getElementById('editor');
  let syncSource = null; // which element triggered the current sync

  let syncClearTimer = null;

  function clearSyncSource() {
    syncClearTimer = null;
    syncSource = null;
  }

  function scheduleClear() {
    if (syncClearTimer) clearTimeout(syncClearTimer);
    syncClearTimer = setTimeout(clearSyncSource, 50);
  }

  function syncToPreview(source) {
    if (syncSource && syncSource !== source) return;
    syncSource = source;
    const pct = source.scrollTop / Math.max(1, source.scrollHeight - source.clientHeight);
    previewEl.scrollTop = pct * Math.max(1, previewEl.scrollHeight - previewEl.clientHeight);
    scheduleClear();
  }

  function syncToEditor(source) {
    if (syncSource && syncSource !== source) return;
    syncSource = source;
    const pct = source.scrollTop / Math.max(1, source.scrollHeight - source.clientHeight);
    const target = editorEl.scrollHeight > editorEl.clientHeight ? editorEl : editorScrollEl;
    target.scrollTop = pct * Math.max(1, target.scrollHeight - target.clientHeight);
    scheduleClear();
  }

  editorScrollEl.addEventListener('scroll', () => {
    const max = editorScrollEl.scrollHeight - editorScrollEl.clientHeight;
    if (max > 0) globalScrollPct = editorScrollEl.scrollTop / max;
    if (currentMode !== 'split') return;
    lastScrolledPane = 'editor';
    if (scrollSynced && syncSource !== editorScrollEl) syncToPreview(editorScrollEl);
  }, { passive: true });

  editorEl.addEventListener('scroll', () => {
    if (currentMode === 'write' || currentMode === 'split') {
      const max = editorEl.scrollHeight - editorEl.clientHeight;
      if (max > 0) globalScrollPct = editorEl.scrollTop / max;
    }
    if (currentMode !== 'split') return;
    lastScrolledPane = 'editor';
    if (scrollSynced && syncSource !== editorEl) syncToPreview(editorEl);
  }, { passive: true });

  previewEl.addEventListener('scroll', () => {
    if (currentMode === 'preview' || currentMode === 'split') {
      const max = previewEl.scrollHeight - previewEl.clientHeight;
      if (max > 0) globalScrollPct = previewEl.scrollTop / max;
    }
    if (currentMode !== 'split') return;
    lastScrolledPane = 'preview';
    if (scrollSynced && syncSource !== previewEl) syncToEditor(previewEl);
  }, { passive: true });
})();

// File System Access API handle — persists for the session
let fileHandle = null;

async function saveFile() {
  const filename = document.getElementById('filename-input').value || 'untitled.txt';
  const blob = new Blob([editor.value], { type: 'text/plain' });

  // If we have a file handle, write directly to it
  if (fileHandle) {
    try {
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
      markClean();
      localStorage.removeItem(AUTOSAVE_KEY);
      flashSaved();
      syncTabName();
      return;
    } catch(e) {
      // Handle lost — fall through to save dialog
      fileHandle = null;
    }
  }

  // If File System Access API is available, use Save As dialog and remember the handle
  if ('showSaveFilePicker' in window) {
    try {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: 'Text files', accept: { 'text/plain': ['.txt', '.md'] } }]
      });
      document.getElementById('filename-input').value = fileHandle.name;
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
      markClean();
      localStorage.removeItem(AUTOSAVE_KEY);
      flashSaved();
      syncTabName();
      return;
    } catch(e) {
      // User cancelled — do nothing
      if (e.name === 'AbortError') return;
      fileHandle = null;
    }
  }

  // Fallback — standard download
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  markClean();
  localStorage.removeItem(AUTOSAVE_KEY);
  flashSaved();
  syncTabName();
}

// When opening a file, try to get a file handle so we can save back to it
async function openFileWithHandle() {
  if ('showOpenFilePicker' in window) {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'Text files', accept: { 'text/plain': ['.txt', '.md'] } }]
      });
      fileHandle = handle;
      const file = await handle.getFile();
      document.getElementById('filename-input').value = file.name;
      const text = await file.text();
      editor.value = text;
      updateStats();
      markClean();
      if (currentMode !== 'write') renderPreview();
      return true;
    } catch(e) {
      // AbortError = user cancelled, treat as handled
      if (e.name === 'AbortError') return true;
      // Any other error — fall through to legacy file input
      return false;
    }
  }
  return false;
}

function syncTabName() {
  const tab = getActiveTab();
  if (tab) {
    tab.name   = document.getElementById('filename-input').value || 'untitled.txt';
    tab.dirty  = false;
    tab.handle = fileHandle;
    renderTabs();

}

  };
  reader.readAsText(file);
  e.target.value = '';
});

function applyCustomColors() {
  if (document.getElementById('theme-select').value !== 'custom') return;
  const bg     = document.getElementById('color-bg').value;
  const text   = document.getElementById('color-text').value;
  const accent = document.getElementById('color-accent').value;
  document.documentElement.style.setProperty('--bg',     bg);
  document.documentElement.style.setProperty('--surface',adjustHex(bg,-10));
  document.documentElement.style.setProperty('--text',   text);
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--muted',  blendHex(text,bg,0.5));
  document.documentElement.style.setProperty('--border', blendHex(text,bg,0.15));

  ['--bg','--surface','--text','--accent','--muted','--border'].forEach(v =>
    document.documentElement.style.removeProperty(v)
  );

function hexToRgb(h){const n=parseInt(h.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255];}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');}
function adjustHex(h,a){const[r,g,b]=hexToRgb(h);return rgbToHex(r+a,g+a,b+a);}
function blendHex(f,b,t){const[r1,g1,b1]=hexToRgb(f);const[r2,g2,b2]=hexToRgb(b);return rgbToHex(r1*t+r2*(1-t),g1*t+g2*(1-t),b1*t+b2*(1-t));}

// Sync color picker → hex input
['bg','text','accent'].forEach(key => {
  const picker = document.getElementById('color-' + key);
  const hex    = document.getElementById('hex-' + key);
  picker.addEventListener('input', () => {
    hex.value = picker.value;
    applyCustomColors();
  });
  // Sync hex input → color picker
  hex.addEventListener('input', () => {
    const val = hex.value.trim();
    if (/^#[0-9a-fA-F]{6}$/.test(val)) {
      picker.value = val;
      applyCustomColors();
    }
  });
  hex.addEventListener('blur', () => {
    // Normalize on blur — if invalid, reset to current picker value
    if (!/^#[0-9a-fA-F]{6}$/.test(hex.value.trim())) {
      hex.value = picker.value;
    }
  });

function wrapSelection(before, after) {
  const start = editor.selectionStart;
  const end   = editor.selectionEnd;
  const sel   = editor.value.substring(start, end);
  editor.setRangeText(before + sel + after, start, end, 'select');
  editor.focus();
  if (!sel) editor.selectionStart = editor.selectionEnd = start + before.length;
  updateStats();
  if (currentMode!=='write') renderPreview();
}

editor.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveFile(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='b') { e.preventDefault(); wrapSelection('**','**'); }
  if ((e.ctrlKey||e.metaKey) && e.key==='i') { e.preventDefault(); wrapSelection('*','*'); }
  if ((e.ctrlKey||e.metaKey) && e.key==='k') {
    e.preventDefault();
    const pos   = editor.selectionStart;
    const end   = editor.selectionEnd;
    const sel   = editor.value.substring(pos, end);
    const replacement = sel ? `[${sel}](url)` : `[](url)`;
    editor.setRangeText(replacement, pos, end, 'end');
    // Place cursor inside the url() part
    const urlStart = pos + replacement.indexOf('(url)') + 1;
    editor.setSelectionRange(urlStart, urlStart + 3);
    updateStats();
    if (currentMode !== 'write') renderPreview();
    return;
  }

  // Heading shortcuts Ctrl+1 through Ctrl+4
  if ((e.ctrlKey||e.metaKey) && ['1','2','3','4'].includes(e.key)) {
    e.preventDefault();
    const hashes = '#'.repeat(parseInt(e.key)) + ' ';
    const pos       = editor.selectionStart;
    const text      = editor.value;
    const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
    const lineEnd   = text.indexOf('\n', pos);
    const line      = text.substring(lineStart, lineEnd === -1 ? text.length : lineEnd);
    // Strip any existing heading prefix
    const stripped  = line.replace(/^#{1,6} /, '');
    // If line already has this exact heading level, remove it (toggle off)
    const newLine   = line.startsWith(hashes) ? stripped : hashes + stripped;
    editor.setRangeText(newLine, lineStart, lineEnd === -1 ? text.length : lineEnd, 'end');
    updateStats();
    if (currentMode !== 'write') renderPreview();
    return;
  }

  if (e.key==='Enter') {
    const pos       = editor.selectionStart;
    const text      = editor.value;
    const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
    const line      = text.substring(lineStart, pos);

    // Bullet list continuation
    const bulletMatch = line.match(/^(- )(.*)$/);
    if (bulletMatch) {
      e.preventDefault();
      if (bulletMatch[2].trim() === '') {
        // Empty bullet — remove the "- " on this line, stay on same line
        editor.setRangeText('', lineStart, pos, 'end');
      } else {
        editor.setRangeText('\n- ', pos, pos, 'end');
      }
      updateStats();
      if (currentMode !== 'write') renderPreview();
      return;
    }

    // Numbered list continuation
    const numMatch = line.match(/^(\d+)\. (.*)$/);
    if (numMatch) {
      e.preventDefault();
      if (numMatch[2].trim() === '') {
        // Empty numbered line — remove the "N. " on this line, stay on same line
        editor.setRangeText('', lineStart, pos, 'end');
      } else {
        const next = parseInt(numMatch[1], 10) + 1;
        editor.setRangeText('\n' + next + '. ', pos, pos, 'end');
      }
      updateStats();
      if (currentMode !== 'write') renderPreview();
      return;
    }
  }

  if (e.key==='Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    editor.setRangeText('  ', s, s, 'end');
  }
});

// Restore tab bar when mouse moves to top (peek)

let peekHideTimer = null;

document.addEventListener('mousemove', e => {
  const inFocus  = document.body.classList.contains('focus-mode');
  const isPeeked = document.body.classList.contains('toolbar-peek');
  const toolbar  = document.getElementById('toolbar');

  // When peeked, keep visible as long as mouse is over the toolbar itself
  let overToolbar = false;
  if (isPeeked) {
    const rect = toolbar.getBoundingClientRect();
    overToolbar = e.clientY <= rect.bottom && e.clientY >= rect.top;
  }

  // Trigger peek when mouse moves to top of screen (within 8px)
  const atTop = e.clientY < 8;

  // Autohide mode (non-focus)
  if (autohideEnabled && !inFocus) {
    const nearTop = e.clientY < 60; // tab bar zone
    if (atTop || overToolbar) {
      // Full reveal — toolbar + tabs
      document.body.classList.add('toolbar-peek');
      document.body.classList.remove('tabbar-faded');
      clearTimeout(tabFadeTimer);
    } else if (nearTop) {
      // Mid zone — tabs only, no toolbar
      if (!tabBarPinned) {
        document.body.classList.remove('tabbar-faded');
        clearTimeout(tabFadeTimer);
      }
    } else {
      document.body.classList.remove('toolbar-peek');
    }
  }

  // Focus mode
  if (inFocus) {
    if (atTop || overToolbar) {
      clearTimeout(peekHideTimer);
      document.body.classList.add('toolbar-peek');
    } else {
      clearTimeout(peekHideTimer);
      peekHideTimer = setTimeout(() => {
        document.body.classList.remove('toolbar-peek');
      }, 800);
    }
  }
});

// Keep toolbar visible while interacting with it in focus mode
document.getElementById('toolbar').addEventListener('mouseenter', () => {
  if (document.body.classList.contains('focus-mode')) {
    clearTimeout(peekHideTimer);
    document.body.classList.add('toolbar-peek');
  }
});

document.getElementById('toolbar').addEventListener('mouseleave', () => {
  if (document.body.classList.contains('focus-mode')) {
    clearTimeout(peekHideTimer);
    peekHideTimer = setTimeout(() => {
      document.body.classList.remove('toolbar-peek');
    }, 800);
  }
});

    e.preventDefault(); focusActive ? exitFocus() : enterFocus();
  }
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key.toLowerCase()==='n') {
    e.preventDefault(); triggerCage();

  if ((e.ctrlKey||e.metaKey) && e.key === ']') {

  if ((e.ctrlKey||e.metaKey) && e.key === '[') {
    e.preventDefault();
    const idx = tabs.findIndex(t => t.id === activeTabId);
    if (idx > 0) switchTab(tabs[idx - 1].id);
  }
  if ((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'n') {
    e.preventDefault(); newTab();
  }
  if ((e.ctrlKey||e.metaKey) && e.key.toLowerCase() === 'w') {

// ── Settings persistence ──────────────────────────────────
const SETTINGS_KEY = 'leaf-editor-settings';

function saveSettings() {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({
    version:      2,
    theme:        document.getElementById('theme-select').value,
    font:         document.getElementById('font-select').value,
    fontSize:     document.getElementById('font-size-select').value,
    autohide:     autohideEnabled,
    tabPinned:    tabBarPinned,
    showWelcome:  document.getElementById('chk-welcome').checked,
    crtEnabled:   document.body.classList.contains('crt-on'),
    scrollSynced: scrollSynced,
    customBg:     document.getElementById('color-bg').value,
    customText:   document.getElementById('color-text').value,
    customAccent: document.getElementById('color-accent').value,
  }));
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return;
    // Version check — clear custom color overrides so updated themes apply cleanly
    const parsed = JSON.parse(raw);
    if (!parsed.version || parsed.version < 2) {
      parsed.version = 2;
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(parsed));
    }
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
    if (s.theme !== undefined) {
      document.getElementById('theme-select').value = s.theme;
      document.body.dataset.theme = (s.theme==='custom') ? '' : (s.theme || 'parchment');
      // Always restore custom color picker values regardless of active theme
      if (s.customBg)     { document.getElementById('color-bg').value    = s.customBg;     document.getElementById('hex-bg').value    = s.customBg; }
      if (s.customText)   { document.getElementById('color-text').value  = s.customText;   document.getElementById('hex-text').value  = s.customText; }
      if (s.customAccent) { document.getElementById('color-accent').value= s.customAccent; document.getElementById('hex-accent').value= s.customAccent; }
      if (s.theme==='custom') {
        document.getElementById('custom-colors').style.display = 'flex';
        applyCustomColors();
      }
    }
    if (s.font) {
      document.getElementById('font-select').value = s.font;
      document.documentElement.style.setProperty('--editor-font', s.font);
      const weight = s.font.includes('iAWriter') ? '700' : '400';
      document.documentElement.style.setProperty('--editor-weight', weight);
    }
    if (s.fontSize) {
      document.getElementById('font-size-select').value = s.fontSize;
      document.documentElement.style.setProperty('--font-size', s.fontSize+'px');
    }
    if (s.autohide) {
      autohideEnabled = true;
      document.getElementById('btn-autohide').classList.add('active');
    }
    if (s.tabPinned !== undefined) {
      tabBarPinned = s.tabPinned;
      document.getElementById('btn-pin-tabs').classList.toggle('pinned', tabBarPinned);
      updatePinIcon();
    }
    if (s.showWelcome !== undefined) {
      document.getElementById('chk-welcome').checked = s.showWelcome;
    }
    const btn = document.getElementById('btn-crt-toggle');
    if (s.crtEnabled !== undefined && !s.crtEnabled) {
      document.body.classList.remove('crt-on');
      btn.classList.add('crt-off');
    } else {
      btn.classList.remove('crt-off');
    }
    if (s.scrollSynced !== undefined) {
      scrollSynced = s.scrollSynced;
      updateSyncIcon();
    }
  } catch(e) {}
}

// ── Tab management ───────────────────────────────────────────────────
let tabs = [
  { id: 1, name: 'untitled.txt', content: '', handle: null, dirty: false }
];
let activeTabId = 1;
let nextTabId   = 2;

function getActiveTab() { return tabs.find(t => t.id === activeTabId); }

function renderTabs() {
  const list = document.getElementById('tab-list');
  list.innerHTML = '';
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '') + (tab.dirty ? ' dirty' : '');
    el.dataset.id = tab.id;

    const name = document.createElement('span');
    name.className   = 'tab-name';
    name.textContent = tab.name;
    name.title       = tab.name;

    const close = document.createElement('span');
    close.className   = 'tab-close';
    close.textContent = '×';
    close.title       = 'Close tab';
    close.addEventListener('click', e => { e.stopPropagation(); closeTab(tab.id); });

    el.appendChild(name);
    el.appendChild(close);
    el.addEventListener('click', () => switchTab(tab.id));
    list.appendChild(el);
  });
}

function saveActiveTabState() {
  const tab = getActiveTab();
  if (!tab) return;
  tab.content = editor.value;
  tab.name    = document.getElementById('filename-input').value || 'untitled.txt';
  tab.handle  = fileHandle;
  tab.dirty   = isDirty;
}

function switchTab(id) {
  saveActiveTabState();
  activeTabId = id;
  const tab   = getActiveTab();
  editor.value = tab.content;
  document.getElementById('filename-input').value = tab.name;
  fileHandle = tab.handle;
  isDirty    = tab.dirty;
  lastSavedContent = tab.dirty ? '' : tab.content;
  updateStats();
  if (currentMode !== 'write') renderPreview();
  renderTabs();
  editor.focus();
}

function newTab() {
  saveActiveTabState();
  const tab = { id: nextTabId++, name: 'untitled.txt', content: '', handle: null, dirty: false };
  tabs.push(tab);
  switchTab(tab.id);
}

function openReadmeTab() {
  document.getElementById('about-overlay').style.display = 'none';
  saveActiveTabState();
  const tab = { id: nextTabId++, name: 'README.txt', content: README_CONTENT, handle: null, dirty: false };
  tabs.push(tab);
  switchTab(tab.id);
  requestAnimationFrame(() => {
    editor.scrollTop = 0;
    editor.setSelectionRange(0, 0);
    document.getElementById('editor-scroll').scrollTop = 0;
  });
}

async function closeTab(id) {
  const tab = tabs.find(t => t.id === id);
  if (!tab) return;

  // Check for unsaved changes
  if (tab.dirty || (id === activeTabId && isDirty)) {
    const answer = confirm('Save "' + tab.name + '" before closing?');
    if (answer) {
      // Switch to it and save
      switchTab(id);
      await saveFile();
    }
  }

  tabs = tabs.filter(t => t.id !== id);

  // Always keep at least one tab
  if (tabs.length === 0) {
    tabs = [{ id: nextTabId++, name: 'untitled.txt', content: '', handle: null, dirty: false }];
  }

  // If we closed the active tab, switch to the last one
  if (activeTabId === id) {
    activeTabId = tabs[tabs.length - 1].id;
    const newActive = getActiveTab();
    editor.value = newActive.content;
    document.getElementById('filename-input').value = newActive.name;
    fileHandle   = newActive.handle;
    isDirty      = newActive.dirty;
    lastSavedContent = newActive.dirty ? '' : newActive.content;
    updateStats();
    if (currentMode !== 'write') renderPreview();
  }
  renderTabs();
}

function restoreAutosave() {
  try {
    const raw = localStorage.getItem(AUTOSAVE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.content && data.content !== '') {
      const dt = new Date(data.savedAt).toLocaleTimeString();
      const restore = confirm('An autosaved draft of "' + (data.filename || 'untitled') + '" was found from ' + dt + '.\n\nRestore it?');

        editor.value = data.content;
        document.getElementById('filename-input').value = data.filename || 'untitled.txt';
        updateStats();
        if (currentMode !== 'write') renderPreview();
      }
      localStorage.removeItem(AUTOSAVE_KEY);
    }
  } catch(e) {}
}

(function() {
  const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let konamiPos = 0;
  let konamiStartedOnBlankLine = false;

  // Check blank line on keydown before cursor moves
  document.getElementById('editor').addEventListener('keydown', e => {
    if (e.key === KONAMI[0] && konamiPos === 0) {
      const ed = document.getElementById('editor');
      const lines = ed.value.split('\n');
      const lineIndex = ed.value.substring(0, ed.selectionEnd).split('\n').length - 1;
      konamiStartedOnBlankLine = lines[lineIndex].trim() === '';
    }
  });

  document.getElementById('editor').addEventListener('keyup', e => {
    if (e.key === KONAMI[konamiPos]) {
      konamiPos++;
      if (konamiPos === KONAMI.length) {
        konamiPos = 0;
        const body = document.body;
        if (body.dataset.theme !== 'terminal' || !body.classList.contains('crt-on')) return;
        if (!konamiStartedOnBlankLine) return;
        if (justWriteActive) return;
        // Erase the 'ba' typed during the sequence
        const ed = document.getElementById('editor');
        const pos = ed.selectionEnd;
        ed.value = ed.value.substring(0, pos - 2) + ed.value.substring(pos);
        ed.selectionStart = ed.selectionEnd = pos - 2;
        // Toggle amber
        if (body.classList.contains('amber-crt')) {
          body.classList.remove('amber-crt');
          if (document.getElementById('chk-welcome').checked) typeStatusMessage('GREEN CRT MODE RESTORED.');
        } else {
          body.classList.add('amber-crt');
          if (document.getElementById('chk-welcome').checked) typeStatusMessage('AMBER CRT MODE ACTIVATE!!');
        }
      }
    } else {
      konamiPos = e.key === KONAMI[0] ? 1 : 0;
    }
  });
})();

let cageActive = false;

function triggerCage() {
  if (cageActive) return;
  cageActive = true;
  const overlay = document.getElementById('cage-overlay');
  overlay.innerHTML = '';
  const count     = 12;
  const spawnSpan = 800;  // all small cages spawn within first 800ms
  const finaleAt  = 1800; // finale starts mid-chaos
  const finaleDur = 2500; // finale duration
  const fadeBeginsAt = finaleAt + (finaleDur * 0.70); // when finale fade-out begins
  const cageDur   = fadeBeginsAt; // small cages finish exactly when finale starts fading

  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const img = document.createElement('img');
      img.src = CAGE_SRC;
      img.className = 'cage-img';
      const x = 10 + Math.random() * 80;
      const y = 10 + Math.random() * 80;
      img.style.left = x + 'vw';
      img.style.top  = y + 'vh';
      img.style.setProperty('--cage-spin', (Math.random() * 720 - 360).toFixed(0) + 'deg');
      img.style.setProperty('--cage-tilt', (Math.random() * 60 - 30).toFixed(0) + 'deg');
      img.style.setProperty('--cage-dur', Math.round(cageDur) + 'ms');
      overlay.appendChild(img);
    }, (i / count) * spawnSpan);
  }

  // Finale bursts out mid-chaos, zooms to fill screen, fades last
  setTimeout(() => {
    const final = document.createElement('div');
    final.id = 'cage-final';
    final.style.setProperty('--cage-bg', `url('${CAGE_SRC}')`);
    document.body.appendChild(final);
    setTimeout(() => { final.remove(); overlay.innerHTML = ''; cageActive = false; }, 2500);
  }, finaleAt);
}

</script>
